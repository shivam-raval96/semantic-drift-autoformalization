name = "lean_checker"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["LeanChecker"]

[leanOptions]
pp.unicode.fun = true
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.31.0"

[[lean_lib]]
name = "LeanChecker"
